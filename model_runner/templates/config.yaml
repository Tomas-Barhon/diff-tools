runner:
  script_path: "./reinforce_baseline.py"

collector:
  regex: "The mean \\d+-episode return after evaluation (-?\\d+(?:\\.\\d+)?)"

search:
  param_grid:
    batch_size: [1, 4]
    episodes: [200, 500, 100]
    gamma: [0.99]
    hidden_layer_size: [64]
    learning_rate_policy: [0.01]
    learning_rate_value: 0.1

execution:
  jobs: 1
  continue_on_failure: true

reporting:
  results_csv: "results.csv"
  top_k: 5
  metric_name: "mean_return"
  metric_mode: "max"
  show_progress: true
  show_run_logs: true
